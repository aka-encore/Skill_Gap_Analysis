  <!-- ── Main Centered Card Container (UNTOUCHED) ── -->
  <div class="auth-center-wrapper">
    <div class="auth-card-modern">
      
      <!-- Welcome Header -->
      <div class="auth-header">
        <div class="auth-logo-center">
          <div class="auth-logo-icon"><i class="fa-solid fa-brain"></i></div>
          <span class="auth-logo-text">SkillBridge</span>
        </div>
        <h1 class="auth-title">Welcome Back to SkillBridge</h1>
        <p class="auth-subtitle">Choose your role and sign in to continue your learning journey.</p>
      </div>

      <!-- Role Selection Tabs -->
      <div class="role-selector" id="roleSelector">
        <button type="button" class="role-tab active" data-role="student" onclick="selectRole('student', this)">
          <span class="role-emoji">👨‍🎓</span>
          <span class="role-label">Student</span>
        </button>
        <button type="button" class="role-tab" data-role="faculty" onclick="selectRole('faculty', this)">
          <span class="role-emoji">👨‍🏫</span>
          <span class="role-label">Faculty</span>
        </button>
        <button type="button" class="role-tab" data-role="admin" onclick="selectRole('admin', this)">
          <span class="role-emoji">👨‍💼</span>
          <span class="role-label">Admin</span>
        </button>
      </div>

      <!-- Login Form -->
      <form class="auth-form" id="loginForm" onsubmit="handleLogin(event)">
        
        <!-- Email -->
        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-icon-wrapper">
            <i class="fa-solid fa-envelope icon"></i>
            <input type="email" id="email" class="form-control" placeholder="you@example.com" required />
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-icon-wrapper">
            <i class="fa-solid fa-lock icon"></i>
            <input type="password" id="password" class="form-control" placeholder="Enter your password" required style="padding-right:44px" />
            <button type="button" id="togglePw" class="pw-toggle-btn" title="Toggle password visibility">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
        </div>

        <!-- Remember Me & Forgot Password -->
        <div class="auth-meta">
          <label class="checkbox-wrapper">
            <input type="checkbox" id="remember" />
            <span>Remember me</span>
          </label>
          <a href="#" class="auth-forgot">Forgot password?</a>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn-auth">
          <i class="fa-solid fa-sign-in-alt"></i> Sign In as <span id="roleButtonLabel">Student</span>
        </button>

        <!-- Divider -->
        <div class="auth-divider">or continue with</div>

        <!-- Social Login -->
        <button type="button" class="btn-social">
          <svg width="20" height="20" viewBox="0 0 48 48">
            <path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.7 32.7 29.2 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.3 29.4 4 24 4 12.9 4 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.6-.4-3.9z"/>
            <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 15.1 19 12 24 12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.3 29.4 4 24 4 16.3 4 9.7 8.4 6.3 14.7z"/>
            <path fill="#4CAF50" d="M24 44c5.3 0 10.1-2 13.7-5.2l-6.3-5.3C29.5 35.5 26.9 36 24 36c-5.2 0-9.6-3.3-11.3-7.9l-6.5 5C9.6 39.5 16.3 44 24 44z"/>
            <path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.3 5.6l6.3 5.3C40.7 36.3 44 30.6 44 24c0-1.3-.1-2.6-.4-3.9z"/>
          </svg>
          Continue with Google
        </button>
      </form>

      <!-- Footer -->
      <div class="auth-footer">
        Don't have an account? <a href="register.html">Create Account</a>
      </div>

    </div>
  </div>

  <script>
    // Selected Role state management
    let selectedRole = 'student';

    function selectRole(role, btnElement) {
      selectedRole = role;
      
      // Update UI active tab
      document.querySelectorAll('.role-tab').forEach(tab => tab.classList.remove('active'));
      btnElement.classList.add('active');

      // Update button label dynamically
      const roleCapitalized = role.charAt(0).toUpperCase() + role.slice(1);
      document.getElementById('roleButtonLabel').textContent = roleCapitalized;
    }

    // Toggle password visibility
    document.getElementById('togglePw').addEventListener('click', function() {
      const pw = document.getElementById('password');
      const icon = this.querySelector('i');
      if (pw.type === 'password') {
        pw.type = 'text';
        icon.className = 'fa-solid fa-eye-slash';
      } else {
        pw.type = 'password';
        icon.className = 'fa-solid fa-eye';
      }
    });

    // Handle Form Login Navigation based on role
    function handleLogin(event) {
      event.preventDefault();
      
      // Redirect based on selected role
      if (selectedRole === 'faculty') {
        window.location.href = 'faculty-dashboard.html';
      } else if (selectedRole === 'admin') {
        window.location.href = 'faculty-dashboard.html';
      } else {
        window.location.href = 'student-dashboard.html';
      }
    }

    // Smooth Cursor Parallax Effect for Background Icons
    let mouseX = 0, mouseY = 0;
    let currentX = 0, currentY = 0;

    document.addEventListener('mousemove', (e) => {
      mouseX = (e.clientX - window.innerWidth / 2) * 0.025;
      mouseY = (e.clientY - window.innerHeight / 2) * 0.025;
    });

    function animateParallax() {
      currentX += (mouseX - currentX) * 0.05;
      currentY += (mouseY - currentY) * 0.05;
      const bg = document.querySelector('.tech-bg-container');
      if (bg) {
        bg.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`;
      }
      requestAnimationFrame(animateParallax);
    }
    requestAnimationFrame(animateParallax);
  </script>
